<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CaptionFlow — Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f7f5;
      --surface: #ffffff;
      --border: #e4e8e4;
      --text: #111;
      --text-secondary: #555;
      --text-muted: #999;
      --accent: #16a34a;
      --accent-light: #dcfce7;
      --accent-mid: #22c55e;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .logo-mark {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      color: #fff; letter-spacing: -0.5px;
      margin: 0 auto 16px;
      box-shadow: 0 2px 8px rgba(34,197,94,0.3);
    }
    h1 {
      font-size: 22px; font-weight: 600;
      letter-spacing: -0.5px; margin-bottom: 6px;
    }
    .sub {
      font-size: 14px; color: var(--text-muted);
      margin-bottom: 28px; line-height: 1.6;
    }
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: #f5f7f5;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
      transition: border-color 0.15s;
      margin-bottom: 12px;
    }
    input[type="password"]:focus { border-color: var(--accent-mid); }
    input[type="password"]::placeholder { letter-spacing: 0; color: #bbb; }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
      color: #fff; border: none;
      border-radius: 10px;
      font-size: 14px; font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(34,197,94,0.25);
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .error {
      background: #fff5f5;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px; color: #e53e3e;
      margin-bottom: 12px;
    }
    .divider {
      border: none; border-top: 1px solid var(--border);
      margin: 20px 0;
    }
    .buy-link {
      font-size: 13px; color: var(--text-muted);
    }
    .buy-link a {
      color: var(--accent); text-decoration: none; font-weight: 500;
    }
    .buy-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-mark">CF</div>
    <h1>CaptionFlow</h1>
    <p class="sub">Enter your access password to continue</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <input type="password" name="password" placeholder="Enter password" autofocus />
      <button type="submit" class="btn">Access CaptionFlow →</button>
    </form>

    <div class="divider"></div>
    <p class="buy-link">Don't have access? <a href="https://captionflow.gumroad.com/l/captionflow" target="_blank">Get it here for $19 →</a></p>
  </div>
</body>
</html>
